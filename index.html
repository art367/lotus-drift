<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lotus Drift</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e1a;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;width:100%;height:100%}
#start-screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;font-family:'Georgia','Times New Roman',serif;background:linear-gradient(180deg,#0a0e1a 0%,#0f1428 40%,#111830 100%);transition:opacity 2.5s ease}
#start-screen.hidden{opacity:0;pointer-events:none}
.title{font-size:clamp(2.8rem,8vw,5.5rem);color:#f0e4ec;letter-spacing:0.12em;text-shadow:0 0 60px rgba(255,170,200,0.25);font-weight:300;margin-bottom:0.2em}
.subtitle{font-size:clamp(0.85rem,2.2vw,1.15rem);color:rgba(190,175,200,0.55);letter-spacing:0.35em;text-transform:uppercase;margin-bottom:3em;font-weight:300}
.start-btn{background:none;border:1px solid rgba(255,200,220,0.18);color:rgba(255,215,225,0.65);padding:1em 3.5em;font-size:clamp(0.85rem,2vw,1.05rem);font-family:inherit;letter-spacing:0.25em;cursor:pointer;transition:all 0.8s ease;border-radius:50px}
.start-btn:hover{border-color:rgba(255,200,220,0.45);color:rgba(255,220,230,0.95);box-shadow:0 0 40px rgba(255,170,200,0.12);background:rgba(255,200,220,0.04)}
#sound-toggle{position:fixed;top:1.2rem;right:1.2rem;background:none;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.35);width:42px;height:42px;border-radius:50%;font-size:1.1rem;cursor:pointer;z-index:20;transition:all 0.5s;display:none;line-height:42px;text-align:center;padding:0}
#sound-toggle:hover{border-color:rgba(255,255,255,0.25);color:rgba(255,255,255,0.6)}
.hint{position:fixed;bottom:6%;left:50%;transform:translateX(-50%);color:rgba(180,170,190,0);font-size:clamp(0.7rem,1.8vw,0.85rem);letter-spacing:0.18em;font-family:'Georgia',serif;pointer-events:none;z-index:15;transition:color 2s ease}
.hint.show{color:rgba(180,170,190,0.35)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="start-screen">
<div class="title">Lotus Drift</div>
<div class="subtitle">a breathing space</div>
<button class="start-btn" id="start-btn">Enter the Pond</button>
</div>
<button id="sound-toggle">♪</button>
<div class="hint" id="hint">touch the water</div>
<script>
// ═══════════════════════════════════════════
// LOTUS DRIFT v2 — Side-On Zen Pond
// ═══════════════════════════════════════════
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,WATER_Y;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight;WATER_Y=H*0.52}
resize();addEventListener('resize',resize);

const lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,lo,hi)=>Math.min(hi,Math.max(lo,v));
const rand=(a,b)=>Math.random()*(b-a)+a, randInt=(a,b)=>Math.floor(rand(a,b+1));
const easeOut=t=>1-(1-t)*(1-t), easeInOut=t=>t<.5?2*t*t:-1+(4-2*t)*t;
const dist=(x1,y1,x2,y2)=>Math.hypot(x2-x1,y2-y1);
const hsla=(h,s,l,a)=>`hsla(${h},${s}%,${l}%,${a})`;
const rgba=(r,g,b,a)=>`rgba(${r},${g},${b},${a})`;

// ═══════════════════════════════════════════
// ZEN AUDIO ENGINE — Spa Ambience
// ═══════════════════════════════════════════
class ZenAudio{
  constructor(){this.ctx=null;this.on=false;this.init_=false;this.vol=0.4}
  init(){
    if(this.init_)return;
    try{
      this.ctx=new(AudioContext||webkitAudioContext)();
      this.master=this.ctx.createGain();this.master.gain.value=this.vol;
      this.master.connect(this.ctx.destination);
      // Reverb
      this.rev=this.ctx.createConvolver();
      const len=this.ctx.sampleRate*3.5,imp=this.ctx.createBuffer(2,len,this.ctx.sampleRate);
      for(let ch=0;ch<2;ch++){const d=imp.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.8)}
      this.rev.buffer=imp;
      this.revG=this.ctx.createGain();this.revG.gain.value=0.35;
      this.rev.connect(this.revG);this.revG.connect(this.master);
      this._drone();this._water();this._melody();
      this.init_=true;this.on=true;
    }catch(e){}
  }
  _drone(){
    [55,82.5,110,165].forEach(f=>{
      const o=this.ctx.createOscillator();o.type='sine';o.frequency.value=f;
      const g=this.ctx.createGain();g.gain.value=f<100?0.018:0.008;
      o.connect(g);g.connect(this.master);o.start();
    });
  }
  _water(){
    const bs=this.ctx.sampleRate*2,buf=this.ctx.createBuffer(1,bs,this.ctx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<bs;i++)d[i]=Math.random()*2-1;
    const src=this.ctx.createBufferSource();src.buffer=buf;src.loop=true;
    const lp=this.ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=180;lp.Q.value=0.4;
    const g=this.ctx.createGain();g.gain.value=0.025;
    src.connect(lp);lp.connect(g);g.connect(this.master);src.start();
  }
  _melody(){
    // Gentle zen melody — pentatonic notes cycling softly
    const notes=[261.63,293.66,329.63,392,440,523.25,293.66,392];
    let i=0;
    const play=()=>{
      if(!this.on)return;
      const now=this.ctx.currentTime,f=notes[i%notes.length]*0.5;
      // Main tone
      const o=this.ctx.createOscillator();o.type='sine';o.frequency.value=f;
      const g=this.ctx.createGain();
      g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime(0.04,now+0.8);
      g.gain.exponentialRampToValueAtTime(0.001,now+5);
      o.connect(g);g.connect(this.rev);g.connect(this.master);
      o.start(now);o.stop(now+5.5);
      // Octave shimmer
      const o2=this.ctx.createOscillator();o2.type='sine';o2.frequency.value=f*2;
      const g2=this.ctx.createGain();
      g2.gain.setValueAtTime(0,now);
      g2.gain.linearRampToValueAtTime(0.012,now+0.5);
      g2.gain.exponentialRampToValueAtTime(0.001,now+3.5);
      o2.connect(g2);g2.connect(this.rev);
      o2.start(now);o2.stop(now+4);
      i++;
      setTimeout(play,rand(3500,6000));
    };
    setTimeout(play,2000);
  }
  chime(pitch){
    if(!this.on||!this.ctx)return;
    const freqs=[329.63,392,440,523.25,587.33,659.25,783.99];
    const f=freqs[pitch%freqs.length],now=this.ctx.currentTime;
    const o=this.ctx.createOscillator();o.type='sine';o.frequency.value=f;
    const g=this.ctx.createGain();
    g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(0.07,now+0.15);
    g.gain.exponentialRampToValueAtTime(0.001,now+3.5);
    o.connect(g);g.connect(this.rev);g.connect(this.master);
    o.start(now);o.stop(now+4);
    // Bell harmonic
    const o2=this.ctx.createOscillator();o2.type='sine';o2.frequency.value=f*3.01;
    const g2=this.ctx.createGain();
    g2.gain.setValueAtTime(0,now);g2.gain.linearRampToValueAtTime(0.015,now+0.08);
    g2.gain.exponentialRampToValueAtTime(0.001,now+2);
    o2.connect(g2);g2.connect(this.rev);o2.start(now);o2.stop(now+2.5);
  }
  ripple(){
    if(!this.on||!this.ctx)return;
    const now=this.ctx.currentTime,o=this.ctx.createOscillator();
    o.type='sine';o.frequency.setValueAtTime(200,now);
    o.frequency.exponentialRampToValueAtTime(50,now+1.2);
    const g=this.ctx.createGain();g.gain.setValueAtTime(0.025,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+1.2);
    o.connect(g);g.connect(this.master);o.start(now);o.stop(now+1.5);
  }
  toggle(){this.on=!this.on;this.master.gain.setTargetAtTime(this.on?this.vol:0,this.ctx.currentTime,0.3);return this.on}
}
const audio=new ZenAudio();

// ═══════════════════════════════════════════
// SIDE-VIEW LOTUS — Profile bloom
// ═══════════════════════════════════════════
class Lotus{
  constructor(x,opts={}){
    this.x=x;
    this.baseY=WATER_Y;
    this.y=this.baseY;
    this.size=opts.size||rand(28,48);
    this.petalLayers=[
      {count:randInt(5,7), length:1, width:0.28, hueShift:0},      // outer
      {count:randInt(4,6), length:0.8, width:0.24, hueShift:5},    // middle
      {count:randInt(3,4), length:0.55, width:0.2, hueShift:10},   // inner
    ];
    this.openness=0; // 0=closed bud, 1=open
    this.targetOpen=0;
    this.bloomSpeed=rand(0.12,0.22);
    this.glowIntensity=0;
    this.blooming=false;
    this.bloomed=false;
    this.touched=false;
    this.chimeIdx=randInt(0,6);

    // Drift
    this.vx=rand(-4,4);
    this.bobPhase=rand(0,Math.PI*2);
    this.bobAmp=rand(2,5);
    this.swayPhase=rand(0,Math.PI*2);

    // Color palette
    const pals=[
      {r:245,g:190,b:210,name:'pink'},
      {r:255,g:235,b:238,name:'blush'},
      {r:238,g:215,b:245,name:'lavender'},
      {r:255,g:248,b:242,name:'cream'},
      {r:230,g:200,b:220,name:'mauve'},
    ];
    this.color=pals[randInt(0,pals.length-1)];
    this.alpha=0;
    this.fadeIn=rand(1.5,3);
    this.life=0;
    this.dead=false;
    this.isRare=Math.random()<0.07;
    if(this.isRare){this.size*=1.5;this.bloomSpeed*=0.5;this.petalLayers[0].count+=2}

    // Post-bloom fade
    this.fadeTimer=0;
    this.fading=false;
  }

  touch(){
    if(this.blooming||this.bloomed)return false;
    this.blooming=true;this.targetOpen=1;this.touched=true;
    return true;
  }

  update(dt,time){
    this.life+=dt;
    this.alpha=this.life<this.fadeIn?easeOut(this.life/this.fadeIn):1;

    // Drift & bob
    this.x+=this.vx*dt;
    this.y=this.baseY+Math.sin(time*0.6+this.bobPhase)*this.bobAmp;

    // Sway
    const sway=Math.sin(time*0.3+this.swayPhase)*2;

    // Bloom
    if(this.blooming){
      this.openness=lerp(this.openness,this.targetOpen,this.bloomSpeed*dt);
      this.glowIntensity=lerp(this.glowIntensity,this.openness*0.9,dt*0.8);
      if(this.openness>0.97){this.openness=1;this.blooming=false;this.bloomed=true}
    }

    // Post-bloom slow fade
    if(this.bloomed){
      this.fadeTimer+=dt;
      this.glowIntensity=0.4+0.4*Math.sin(time*0.4+this.bobPhase);
      if(this.fadeTimer>30){this.fading=true}
    }
    if(this.fading){
      this.alpha=lerp(this.alpha,0,0.02*dt);
      this.openness=lerp(this.openness,0.3,0.015*dt);
      if(this.alpha<0.02)this.dead=true;
    }

    // Off screen
    if(this.x<-120||this.x>W+120)this.dead=true;

    this._sway=sway;
  }

  draw(ctx,time){
    if(this.alpha<0.01)return;
    const a=this.alpha, s=this.size, op=this.openness;
    ctx.save();
    ctx.translate(this.x,this.y);

    // ── Reflection in water ──
    ctx.save();
    ctx.translate(0,8);
    ctx.scale(1,0.4);
    ctx.globalAlpha=a*0.15;
    this._drawFlower(ctx,time,s,op,true);
    ctx.restore();

    // ── Glow on water ──
    if(this.glowIntensity>0.01){
      const gr=s*2.5;
      const grd=ctx.createRadialGradient(0,4,0,0,4,gr);
      grd.addColorStop(0,rgba(this.color.r,this.color.g,this.color.b,this.glowIntensity*a*0.2));
      grd.addColorStop(1,rgba(this.color.r,this.color.g,this.color.b,0));
      ctx.fillStyle=grd;
      ctx.beginPath();ctx.ellipse(0,6,gr,gr*0.4,0,0,Math.PI*2);ctx.fill();
    }

    // ── Stem ──
    ctx.globalAlpha=a;
    const stemH=s*0.8;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.quadraticCurveTo(this._sway*0.5,-stemH*0.5,this._sway,-stemH);
    ctx.strokeStyle=rgba(60,110,70,0.5*a);
    ctx.lineWidth=2.5;
    ctx.stroke();

    // ── Lily pad ──
    ctx.beginPath();
    ctx.ellipse(0,4,s*1.1,s*0.18,0,0,Math.PI*2);
    ctx.fillStyle=rgba(35,90,55,0.35*a);
    ctx.fill();
    // Pad vein
    ctx.beginPath();
    ctx.moveTo(-s*0.7,4);ctx.quadraticCurveTo(0,1,s*0.7,4);
    ctx.strokeStyle=rgba(50,115,65,0.15*a);ctx.lineWidth=0.6;ctx.stroke();

    // ── The flower (above water) ──
    ctx.save();
    ctx.translate(this._sway,-stemH);
    ctx.globalAlpha=a;
    this._drawFlower(ctx,time,s,op,false);
    ctx.restore();

    ctx.restore();
  }

  _drawFlower(ctx,time,s,op,isRefl){
    // Draw petals from outside in, side-on profile view
    for(let li=0;li<this.petalLayers.length;li++){
      const layer=this.petalLayers[li];
      const count=layer.count;
      const layerOpen=clamp(op*(1+li*0.25)-li*0.12,0,1);
      const pLen=s*layer.length*(0.7+layerOpen*0.3);
      const pWid=s*layer.width;

      for(let i=0;i<count;i++){
        // Spread petals in a fan from -90deg to +90deg (side view)
        const t=count===1?0.5:(i/(count-1));
        const baseAngle=-Math.PI*0.5+t*Math.PI; // -90 to +90
        // When closed, petals point straight up; when open, they fan out
        const closedAngle=-Math.PI*0.5; // straight up
        const angle=lerp(closedAngle,baseAngle,layerOpen);
        // Add slight organic wobble
        const wobble=Math.sin(time*0.5+i*1.3+li*2)*0.03*layerOpen;

        ctx.save();
        ctx.rotate(angle+wobble);

        // Petal shape — elongated teardrop
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.bezierCurveTo(
          pWid*0.8,-pLen*0.35,
          pWid*0.5,-pLen*0.85,
          0,-pLen
        );
        ctx.bezierCurveTo(
          -pWid*0.5,-pLen*0.85,
          -pWid*0.8,-pLen*0.35,
          0,0
        );

        // Color with depth
        const depth=0.85+li*0.07;
        const pr=Math.min(255,this.color.r*depth+layer.hueShift);
        const pg=Math.min(255,this.color.g*depth);
        const pb=Math.min(255,this.color.b*depth+layer.hueShift*0.5);
        const pa=isRefl?0.3:(0.55+li*0.12+layerOpen*0.15);

        ctx.fillStyle=rgba(pr,pg,pb,pa);
        ctx.fill();

        // Petal edge highlight
        if(!isRefl&&layerOpen>0.2){
          ctx.strokeStyle=rgba(255,255,255,0.08*layerOpen);
          ctx.lineWidth=0.5;
          ctx.stroke();
        }

        // Central vein on outer petals
        if(li===0&&!isRefl&&layerOpen>0.3){
          ctx.beginPath();
          ctx.moveTo(0,0);
          ctx.lineTo(0,-pLen*0.8);
          ctx.strokeStyle=rgba(pr-20,pg-10,pb,0.1);
          ctx.lineWidth=0.4;
          ctx.stroke();
        }

        ctx.restore();
      }
    }

    // Center pistil — visible when open
    if(op>0.35&&!isRefl){
      const ca=(op-0.35)/0.65;
      const cr=s*0.12;
      const grd=ctx.createRadialGradient(0,-s*0.05,0,0,-s*0.05,cr);
      grd.addColorStop(0,hsla(48,90,72,ca*0.9));
      grd.addColorStop(0.7,hsla(42,80,60,ca*0.5));
      grd.addColorStop(1,hsla(38,70,50,0));
      ctx.fillStyle=grd;
      ctx.beginPath();ctx.arc(0,-s*0.05,cr,0,Math.PI*2);ctx.fill();
      // Tiny dots
      if(op>0.6){
        const da=(op-0.6)/0.4;
        for(let i=0;i<6;i++){
          const ang=i/6*Math.PI*2;
          const dx=Math.cos(ang)*cr*0.55,dy=-s*0.05+Math.sin(ang)*cr*0.55;
          ctx.beginPath();ctx.arc(dx,dy,1,0,Math.PI*2);
          ctx.fillStyle=hsla(50,80,80,da*0.6);ctx.fill();
        }
      }
    }
  }

  hitTest(px,py){
    // Check against flower head position
    const fx=this.x+this._sway;
    const fy=this.y-this.size*0.8;
    return dist(px,py,fx,fy)<this.size*1.8||dist(px,py,this.x,this.y)<this.size*1.2;
  }
}

// ═══════════════════════════════════════════
// DRAGONFLY — Buzzing wings, organic flight
// ═══════════════════════════════════════════
class Dragonfly{
  constructor(x,y){
    this.x=x||rand(0,W);
    this.y=y||rand(WATER_Y*0.2,WATER_Y*0.9);
    this.size=rand(12,22);
    // Flight target
    this.tx=rand(W*0.1,W*0.9);
    this.ty=rand(WATER_Y*0.15,WATER_Y*0.85);
    this.speed=rand(30,70);
    this.accel=rand(0.5,1.5);
    this.vx=0;this.vy=0;
    // Wing animation
    this.wingPhase=rand(0,Math.PI*2);
    this.wingSpeed=rand(18,28); // fast flutter
    // Appearance
    this.hue=rand(160,260); // blue-green-purple range
    this.bodyLen=this.size*1.8;
    this.life=0;
    this.maxLife=rand(15,35);
    this.dead=false;
    this.hovering=false;
    this.hoverTime=0;
    this.hoverDuration=rand(2,5);
    this.alpha=0;
    // Occasional hover near flowers
    this.targetLotus=null;
    this.retargetTimer=rand(2,5);
    this.facing=this.tx>this.x?1:-1;
  }

  pickTarget(lotuses){
    // Sometimes hover near a lotus
    if(lotuses.length>0&&Math.random()<0.4){
      const l=lotuses[randInt(0,lotuses.length-1)];
      this.tx=l.x+rand(-40,40);
      this.ty=l.y-l.size*1.2+rand(-20,10);
      this.targetLotus=l;
    }else{
      this.tx=rand(W*0.05,W*0.95);
      this.ty=rand(WATER_Y*0.1,WATER_Y*0.85);
      this.targetLotus=null;
    }
    this.hovering=false;
    this.hoverTime=0;
    this.retargetTimer=rand(3,7);
  }

  update(dt,time,lotuses){
    this.life+=dt;
    if(this.life>this.maxLife){this.dead=true;return}
    this.alpha=this.life<1?this.life:this.life>this.maxLife-2?(this.maxLife-this.life)/2:1;
    this.wingPhase+=this.wingSpeed*dt;
    this.retargetTimer-=dt;
    if(this.retargetTimer<=0)this.pickTarget(lotuses);

    const dx=this.tx-this.x,dy=this.ty-this.y;
    const d=Math.hypot(dx,dy);

    if(d<15){
      // Arrived — hover
      this.hovering=true;
      this.hoverTime+=dt;
      this.vx*=0.9;this.vy*=0.9;
      // Gentle drift while hovering
      this.x+=Math.sin(time*2)*0.3;
      this.y+=Math.cos(time*1.5)*0.2;
      if(this.hoverTime>this.hoverDuration){
        this.pickTarget(lotuses);
      }
    }else{
      // Fly toward target
      const ax=(dx/d)*this.accel;
      const ay=(dy/d)*this.accel;
      this.vx+=ax*dt*60;this.vy+=ay*dt*60;
      // Damping
      this.vx*=0.96;this.vy*=0.96;
      // Speed limit
      const spd=Math.hypot(this.vx,this.vy);
      if(spd>this.speed){this.vx*=this.speed/spd;this.vy*=this.speed/spd}
      this.x+=this.vx*dt;this.y+=this.vy*dt;
    }

    // Face direction of movement
    if(Math.abs(this.vx)>1)this.facing=this.vx>0?1:-1;

    // Keep in bounds
    this.y=clamp(this.y,20,WATER_Y-5);
  }

  draw(ctx,time){
    if(this.alpha<0.01)return;
    const a=this.alpha;
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.scale(this.facing,1);

    const wingBeat=Math.sin(this.wingPhase);
    const wingAngle=wingBeat*0.7; // wing flap amplitude

    // ── Wings (4 wings — 2 pairs) ──
    // Back wings (slightly smaller)
    this._drawWing(ctx,-2,-1,this.size*0.7,this.size*0.35,-wingAngle*0.8,a*0.25,this.hue);
    this._drawWing(ctx,-2,1,this.size*0.7,this.size*0.35,wingAngle*0.8,a*0.25,this.hue);
    // Front wings (larger)
    this._drawWing(ctx,2,-1,this.size*0.9,this.size*0.4,-wingAngle,a*0.3,this.hue);
    this._drawWing(ctx,2,1,this.size*0.9,this.size*0.4,wingAngle,a*0.3,this.hue);

    // ── Body ──
    const bLen=this.bodyLen;
    // Thorax
    ctx.beginPath();
    ctx.ellipse(0,0,this.size*0.25,this.size*0.15,0,0,Math.PI*2);
    ctx.fillStyle=hsla(this.hue,60,35,a*0.8);
    ctx.fill();

    // Abdomen (long tail)
    ctx.beginPath();
    ctx.moveTo(-this.size*0.15,0);
    ctx.quadraticCurveTo(-bLen*0.5,2,-bLen,0);
    ctx.quadraticCurveTo(-bLen*0.5,-2,-this.size*0.15,0);
    ctx.fillStyle=hsla(this.hue,55,30,a*0.75);
    ctx.fill();
    // Segment lines
    for(let i=1;i<5;i++){
      const sx=-this.size*0.15-i*(bLen*0.17);
      ctx.beginPath();ctx.moveTo(sx,-3);ctx.lineTo(sx,3);
      ctx.strokeStyle=hsla(this.hue,40,25,a*0.2);ctx.lineWidth=0.5;ctx.stroke();
    }

    // Head
    ctx.beginPath();
    ctx.arc(this.size*0.2,0,this.size*0.12,0,Math.PI*2);
    ctx.fillStyle=hsla(this.hue,50,40,a*0.8);
    ctx.fill();

    // Eyes (two big compound eyes)
    ctx.beginPath();
    ctx.arc(this.size*0.28,-this.size*0.06,this.size*0.06,0,Math.PI*2);
    ctx.arc(this.size*0.28,this.size*0.06,this.size*0.06,0,Math.PI*2);
    ctx.fillStyle=hsla(this.hue+30,70,55,a*0.9);
    ctx.fill();

    // ── Eye glow ──
    const eg=ctx.createRadialGradient(this.size*0.28,0,0,this.size*0.28,0,this.size*0.5);
    eg.addColorStop(0,hsla(this.hue+30,80,60,a*0.1));
    eg.addColorStop(1,hsla(this.hue,60,40,0));
    ctx.fillStyle=eg;
    ctx.beginPath();ctx.arc(this.size*0.28,0,this.size*0.5,0,Math.PI*2);ctx.fill();

    ctx.restore();
  }

  _drawWing(ctx,offX,side,wLen,wWid,angle,alpha,hue){
    ctx.save();
    ctx.translate(offX,0);
    ctx.rotate(angle*side);
    // Wing membrane
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(wLen*0.3,side*wWid*1.2,wLen*0.7,side*wWid,wLen,side*wWid*0.3);
    ctx.bezierCurveTo(wLen*0.8,side*wWid*0.05,wLen*0.3,0,0,0);
    // Iridescent fill
    const wg=ctx.createLinearGradient(0,0,wLen,side*wWid);
    wg.addColorStop(0,hsla(hue,50,70,alpha*0.6));
    wg.addColorStop(0.5,hsla(hue+30,60,75,alpha*0.4));
    wg.addColorStop(1,hsla(hue+60,40,80,alpha*0.2));
    ctx.fillStyle=wg;
    ctx.fill();
    // Wing veins
    ctx.strokeStyle=hsla(hue,30,50,alpha*0.3);
    ctx.lineWidth=0.4;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(wLen*0.9,side*wWid*0.35);ctx.stroke();
    ctx.beginPath();ctx.moveTo(wLen*0.15,0);ctx.lineTo(wLen*0.6,side*wWid*0.8);ctx.stroke();
    ctx.restore();
  }

  hitTest(px,py){return dist(px,py,this.x,this.y)<this.size*2}
}

// ═══════════════════════════════════════════
// PARTICLES & EFFECTS
// ═══════════════════════════════════════════
class Ripple{
  constructor(x,y,r){this.x=x;this.y=y;this.r=0;this.maxR=r||rand(60,130);this.life=0;this.maxLife=rand(2.5,4);this.dead=false}
  update(dt){this.life+=dt;if(this.life>=this.maxLife){this.dead=true;return}this.r=this.maxR*easeOut(this.life/this.maxLife)}
  draw(ctx){
    const t=this.life/this.maxLife,a=(1-t)*0.18;
    if(a<0.005)return;
    // Elliptical ripples for side view
    ctx.beginPath();
    ctx.ellipse(this.x,this.y,this.r,this.r*0.25,0,0,Math.PI*2);
    ctx.strokeStyle=rgba(180,210,240,a);ctx.lineWidth=1.2*(1-t);ctx.stroke();
    if(t<0.4){
      ctx.beginPath();
      ctx.ellipse(this.x,this.y,this.r*0.65,this.r*0.16,0,0,Math.PI*2);
      ctx.strokeStyle=rgba(180,210,240,a*0.4);ctx.lineWidth=0.7;ctx.stroke();
    }
  }
}

class LightMote{
  constructor(x,y){
    const ang=rand(-Math.PI,0),spd=rand(8,30);
    this.x=x;this.y=y;this.vx=Math.cos(ang)*spd;this.vy=Math.sin(ang)*spd;
    this.size=rand(1.2,3);this.life=0;this.maxLife=rand(2,5);this.dead=false;
    this.hue=rand(35,60);
  }
  update(dt){this.life+=dt;if(this.life>=this.maxLife){this.dead=true;return}this.x+=this.vx*dt;this.y+=this.vy*dt;this.vx*=0.97;this.vy*=0.97}
  draw(ctx){
    const lt=this.life/this.maxLife,a=(1-lt)*0.6;if(a<0.01)return;
    ctx.beginPath();ctx.arc(this.x,this.y,this.size*(1-lt*0.4),0,Math.PI*2);
    ctx.fillStyle=hsla(this.hue,80,80,a);ctx.fill();
  }
}

class FloatingPetal{
  constructor(x,y,col){
    this.x=x;this.y=y;this.vx=rand(-12,12);this.vy=rand(-15,-5);
    this.rot=rand(0,Math.PI*2);this.rotSpd=rand(-0.5,0.5);
    this.size=rand(4,8);this.life=0;this.maxLife=rand(6,14);this.dead=false;
    this.col=col||{r:240,g:180,b:200};this.gravity=rand(8,15);
  }
  update(dt){
    this.life+=dt;if(this.life>=this.maxLife){this.dead=true;return}
    this.rot+=this.rotSpd*dt;
    this.vy+=this.gravity*dt;
    this.x+=this.vx*dt+Math.sin(this.life*0.8)*dt*3;
    this.y+=this.vy*dt;
    this.vx*=0.99;
    // Settle on water
    if(this.y>WATER_Y+5){this.y=WATER_Y+5;this.vy=0;this.vx*=0.95;this.gravity=0}
  }
  draw(ctx){
    const lt=this.life/this.maxLife;
    let a=lt>0.6?(1-lt)/0.4:1;a*=0.65;if(a<0.01)return;
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    ctx.beginPath();ctx.moveTo(0,-this.size);
    ctx.bezierCurveTo(this.size*0.5,-this.size*0.3,this.size*0.4,this.size*0.4,0,this.size);
    ctx.bezierCurveTo(-this.size*0.4,this.size*0.4,-this.size*0.5,-this.size*0.3,0,-this.size);
    ctx.fillStyle=rgba(this.col.r,this.col.g,this.col.b,a);ctx.fill();
    ctx.restore();
  }
}

// ── Stars ──
class Star{
  constructor(){this.x=rand(0,1);this.y=rand(0,0.45);this.s=rand(0.5,2);this.b=rand(0.2,0.7);this.sp=rand(0.3,1.5);this.off=rand(0,6.28)}
  draw(ctx,t,a){
    const tw=0.5+0.5*Math.sin(t*this.sp+this.off);
    const al=this.b*tw*a;if(al<0.01)return;
    const px=this.x*W,py=this.y*H;
    ctx.beginPath();ctx.arc(px,py,this.s,0,Math.PI*2);ctx.fillStyle=rgba(210,220,250,al);ctx.fill();
    if(this.s>1.2){ctx.beginPath();ctx.arc(px,py,this.s*3,0,Math.PI*2);ctx.fillStyle=rgba(200,210,250,al*0.06);ctx.fill()}
  }
}

// ── Scenery Drawing Functions ──
function drawSky(a){
  // Gradient sky
  const g=X.createLinearGradient(0,0,0,WATER_Y);
  g.addColorStop(0,rgba(10,12,30,a));
  g.addColorStop(0.4,rgba(14,18,42,a));
  g.addColorStop(0.7,rgba(18,22,50,a*0.95));
  g.addColorStop(1,rgba(22,28,55,a*0.85));
  X.fillStyle=g;X.fillRect(0,0,W,WATER_Y);

  // Distant mountains/hills silhouette
  X.beginPath();
  X.moveTo(0,WATER_Y);
  for(let x=0;x<=W;x+=3){
    const h=Math.sin(x*0.003)*25+Math.sin(x*0.007)*15+Math.sin(x*0.001)*40;
    X.lineTo(x,WATER_Y-30-h);
  }
  X.lineTo(W,WATER_Y);X.closePath();
  X.fillStyle=rgba(12,16,35,a*0.7);X.fill();
}

function drawMoon(t,a){
  const mx=W*0.78,my=H*0.13,r=Math.min(W,H)*0.035;
  // Outer glow
  const g=X.createRadialGradient(mx,my,r*0.3,mx,my,r*10);
  g.addColorStop(0,rgba(210,220,245,0.07*a));
  g.addColorStop(0.3,rgba(180,195,225,0.025*a));
  g.addColorStop(1,rgba(150,165,200,0));
  X.fillStyle=g;X.fillRect(mx-r*10,my-r*10,r*20,r*20);
  // Body
  X.beginPath();X.arc(mx,my,r,0,Math.PI*2);
  X.fillStyle=rgba(225,230,248,0.55*a);X.fill();
  // Inner shine
  const ig=X.createRadialGradient(mx-r*0.2,my-r*0.2,0,mx,my,r);
  ig.addColorStop(0,rgba(245,245,255,0.25*a));ig.addColorStop(1,rgba(200,210,240,0));
  X.fillStyle=ig;X.beginPath();X.arc(mx,my,r,0,Math.PI*2);X.fill();
}

function drawWater(t,a){
  // Main water body
  const wg=X.createLinearGradient(0,WATER_Y,0,H);
  wg.addColorStop(0,rgba(15,25,50,0.6*a));
  wg.addColorStop(0.15,rgba(10,20,42,0.75*a));
  wg.addColorStop(0.5,rgba(8,15,35,0.85*a));
  wg.addColorStop(1,rgba(5,10,25,0.9*a));
  X.fillStyle=wg;X.fillRect(0,WATER_Y,W,H-WATER_Y);

  // Water horizon line
  X.beginPath();
  for(let x=0;x<=W;x+=8){
    const y=WATER_Y+Math.sin(x*0.008+t*0.4)*1.5+Math.sin(x*0.02+t*0.25)*0.8;
    x===0?X.moveTo(x,y):X.lineTo(x,y);
  }
  X.strokeStyle=rgba(140,170,210,0.08*a);X.lineWidth=1;X.stroke();

  // Subtle wave lines
  for(let i=1;i<6;i++){
    const by=WATER_Y+i*(H-WATER_Y)*0.15;
    X.beginPath();
    for(let x=0;x<=W;x+=15){
      const y=by+Math.sin(x*0.006+t*0.3+i*0.8)*2.5+Math.sin(x*0.015+t*0.2+i)*1.2;
      x===0?X.moveTo(x,y):X.lineTo(x,y);
    }
    X.strokeStyle=rgba(100,140,180,0.03*a*(1-i*0.15));X.lineWidth=0.7;X.stroke();
  }

  // Moonlight column on water
  const mx=W*0.78;
  const mg=X.createLinearGradient(mx,WATER_Y,mx,H);
  mg.addColorStop(0,rgba(180,200,240,0.035*a));
  mg.addColorStop(0.5,rgba(150,170,210,0.015*a));
  mg.addColorStop(1,rgba(100,120,160,0));
  X.fillStyle=mg;
  X.beginPath();
  X.moveTo(mx-25,WATER_Y);
  X.lineTo(mx+25,WATER_Y);
  X.lineTo(mx+60,H);
  X.lineTo(mx-60,H);
  X.closePath();X.fill();

  // Shimmer
  for(let i=0;i<10;i++){
    const sx=mx+Math.sin(t*0.5+i*1.7)*25;
    const sy=WATER_Y+8+i*(H-WATER_Y)*0.08+Math.sin(t*0.35+i)*2;
    const sa=(0.04+0.04*Math.sin(t*1.4+i*2))*a;
    X.beginPath();X.ellipse(sx,sy,rand(1,3),rand(0.5,1),0,0,Math.PI*2);
    X.fillStyle=rgba(200,220,255,sa);X.fill();
  }
}

function drawFog(t,a,layers){
  layers.forEach(f=>{
    f.x+=f.speed*0.016;
    if(f.x>W+f.w)f.x=-f.w;
    const g=X.createRadialGradient(f.x+f.w/2,f.y,0,f.x+f.w/2,f.y,f.w/2);
    g.addColorStop(0,rgba(150,165,185,f.alpha*a));
    g.addColorStop(1,rgba(150,165,185,0));
    X.fillStyle=g;X.fillRect(f.x,f.y-f.h,f.w,f.h*2);
  });
}

// ═══════════════════════════════════════════
// GAME WORLD STATE
// ═══════════════════════════════════════════
const S={started:false,time:0,phase:0,phaseTime:0,breathCycle:0,breathRate:0.35,globalAlpha:1,lastTouch:0,idle:0,blooms:0};
const world={
  stars:[], lotuses:[], dragonflies:[], ripples:[], motes:[], petals:[],
  fogBack:[], fogFront:[]
};

// Init stars
for(let i=0;i<100;i++)world.stars.push(new Star());
// Init fog layers
for(let i=0;i<3;i++)world.fogBack.push({x:rand(-W*0.3,W),y:rand(WATER_Y*0.3,WATER_Y*0.8),w:rand(W*0.4,W),h:rand(20,60),speed:rand(1.5,5),alpha:rand(0.012,0.03)});
for(let i=0;i<2;i++)world.fogFront.push({x:rand(-W*0.3,W),y:rand(WATER_Y*0.5,WATER_Y*0.95),w:rand(W*0.5,W*1.2),h:rand(25,50),speed:rand(3,8),alpha:rand(0.015,0.03)});

// ── Spawning ──
let lotusTimer=0, dfTimer=0;
function spawnLotus(){
  const alive=world.lotuses.filter(l=>!l.dead).length;
  const max=[8,5,3][S.phase];
  if(alive>=max)return;
  const side=Math.random()<0.5;
  const x=side?rand(-80,-30):rand(W+30,W+80);
  const lot=new Lotus(x);
  lot.vx=side?rand(2,6):rand(-6,-2);
  world.lotuses.push(lot);
}

function spawnDragonfly(){
  const alive=world.dragonflies.filter(d=>!d.dead).length;
  if(alive>=5)return;
  const x=Math.random()<0.5?rand(-50,0):rand(W,W+50);
  const y=rand(WATER_Y*0.15,WATER_Y*0.75);
  world.dragonflies.push(new Dragonfly(x,y));
}

// ═══════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════
let ptrX=-1,ptrY=-1,ptrDown=false;

function interact(x,y){
  if(!S.started)return;
  S.lastTouch=S.time;S.idle=0;

  // Water ripple if touching water area
  if(y>WATER_Y-20){
    world.ripples.push(new Ripple(x,Math.max(y,WATER_Y),rand(50,100)));
    audio.ripple();
  }

  // Check lotus hits
  for(const l of world.lotuses){
    if(l.dead)continue;
    if(l.hitTest(x,y)&&!l.bloomed&&!l.blooming){
      if(l.touch()){
        S.blooms++;
        audio.chime(l.chimeIdx);
        // Spawn motes
        const fx=l.x+(l._sway||0), fy=l.y-l.size*0.8;
        for(let i=0;i<randInt(10,18);i++)world.motes.push(new LightMote(fx,fy));
        // Spawn petals
        for(let i=0;i<randInt(2,4);i++)world.petals.push(new FloatingPetal(fx,fy,l.color));
        // Ripple at lotus base
        world.ripples.push(new Ripple(l.x,WATER_Y,rand(40,80)));
        break;
      }
    }
    // Touch bloomed flower → refresh it, release petals
    if(l.bloomed&&!l.fading&&l.hitTest(x,y)){
      l.fadeTimer=0;
      if(Math.random()<0.5){
        const fx=l.x+(l._sway||0),fy=l.y-l.size*0.8;
        world.petals.push(new FloatingPetal(fx,fy,l.color));
      }
    }
  }

  // Dragonfly interaction — tap near one and it zips away playfully
  for(const df of world.dragonflies){
    if(df.dead)continue;
    if(df.hitTest(x,y)){
      // Startle — fly to a random spot
      df.tx=df.x+(Math.random()<0.5?rand(100,250):rand(-250,-100));
      df.ty=rand(WATER_Y*0.1,WATER_Y*0.6);
      df.speed*=1.8;
      df.hovering=false;
      setTimeout(()=>{if(!df.dead)df.speed=rand(30,70)},1500);
      break;
    }
  }
}

// Mouse
C.addEventListener('mousedown',e=>{ptrDown=true;interact(e.clientX,e.clientY)});
C.addEventListener('mousemove',e=>{ptrX=e.clientX;ptrY=e.clientY;if(ptrDown)interact(e.clientX,e.clientY)});
C.addEventListener('mouseup',()=>ptrDown=false);
// Touch
C.addEventListener('touchstart',e=>{e.preventDefault();ptrDown=true;const t=e.touches[0];interact(t.clientX,t.clientY)},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];ptrX=t.clientX;ptrY=t.clientY;interact(t.clientX,t.clientY)},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();ptrDown=false},{passive:false});
C.addEventListener('contextmenu',e=>e.preventDefault());

// ═══════════════════════════════════════════
// PHASE PROGRESSION
// ═══════════════════════════════════════════
function updatePhase(dt){
  S.phaseTime+=dt;S.idle+=dt;
  if(S.phase===0&&S.phaseTime>100){S.phase=1;S.phaseTime=0}
  else if(S.phase===1&&S.phaseTime>130){S.phase=2;S.phaseTime=0}
  if(S.idle>35&&S.phase<2){S.phase=Math.min(2,S.phase+1);S.phaseTime=0;S.idle=0}
  S.breathRate=lerp(S.breathRate,[0.35,0.28,0.2][S.phase],dt*0.05);
  if(S.phase===2){
    const dim=Math.max(0.2,1-S.phaseTime*0.002);
    S.globalAlpha=lerp(S.globalAlpha,dim,dt*0.02);
  }else{
    S.globalAlpha=lerp(S.globalAlpha,1,dt*0.05);
  }
}

// ═══════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════
let lastTime=0;

function update(dt){
  S.time+=dt;
  S.breathCycle+=Math.PI*2*S.breathRate*dt;
  updatePhase(dt);

  // Spawning
  lotusTimer-=dt;
  if(lotusTimer<=0){spawnLotus();lotusTimer=rand([2,4.5,8][S.phase],[4,8,15][S.phase])}
  dfTimer-=dt;
  if(dfTimer<=0){spawnDragonfly();dfTimer=rand(5,12)}

  // Update all
  world.lotuses.forEach(l=>l.update(dt,S.time));
  world.dragonflies.forEach(d=>d.update(dt,S.time,world.lotuses));
  world.ripples.forEach(r=>r.update(dt));
  world.motes.forEach(m=>m.update(dt));
  world.petals.forEach(p=>p.update(dt));

  // Clean dead
  world.lotuses=world.lotuses.filter(l=>!l.dead);
  world.dragonflies=world.dragonflies.filter(d=>!d.dead);
  world.ripples=world.ripples.filter(r=>!r.dead);
  world.motes=world.motes.filter(m=>!m.dead);
  world.petals=world.petals.filter(p=>!p.dead);
}

function draw(){
  const a=S.globalAlpha;
  X.fillStyle='#0a0e1a';X.fillRect(0,0,W,H);

  // Sky + mountains
  drawSky(a);
  world.stars.forEach(s=>s.draw(X,S.time,a));
  drawMoon(S.time,a);

  // Fog behind scene
  drawFog(S.time,a*0.6,world.fogBack);

  // Water
  drawWater(S.time,a);

  // Ripples (on water surface)
  world.ripples.forEach(r=>r.draw(X));

  // Petals on water
  world.petals.forEach(p=>{if(p.y>=WATER_Y-2)p.draw(X)});

  // Lotuses (sorted by y for depth)
  const sortedLotus=[...world.lotuses].sort((a,b)=>a.y-b.y);
  sortedLotus.forEach(l=>l.draw(X,S.time));

  // Petals in air
  world.petals.forEach(p=>{if(p.y<WATER_Y-2)p.draw(X)});

  // Light motes
  world.motes.forEach(m=>m.draw(X));

  // Dragonflies
  world.dragonflies.forEach(d=>d.draw(X,S.time));

  // Fog in front
  drawFog(S.time+200,a*0.3,world.fogFront);

  // Subtle breathing indicator (phase 1+)
  if(S.phase>=1){
    const bt=(1+Math.sin(S.breathCycle))/2;
    const ba=0.05*a;
    if(ba>0.005){
      const bs=2.5+bt*3.5;
      X.beginPath();X.arc(W/2,H-30,bs,0,Math.PI*2);
      X.fillStyle=rgba(200,200,220,ba);X.fill();
    }
  }
}

function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  if(S.started){update(dt);draw()}
  requestAnimationFrame(loop);
}

// ── Pre-start ambient animation ──
function preStart(){
  if(S.started)return;
  S.time+=0.016;
  X.fillStyle='#0a0e1a';X.fillRect(0,0,W,H);
  drawSky(0.5);
  world.stars.forEach(s=>s.draw(X,S.time,0.35));
  drawMoon(S.time,0.35);
  drawWater(S.time,0.3);
  requestAnimationFrame(preStart);
}
preStart();

// ═══════════════════════════════════════════
// UI SETUP
// ═══════════════════════════════════════════
const startScr=document.getElementById('start-screen');
const startBtn=document.getElementById('start-btn');
const hintEl=document.getElementById('hint');
const soundBtn=document.getElementById('sound-toggle');

startBtn.addEventListener('click',()=>{
  S.started=true;
  audio.init();
  startScr.classList.add('hidden');
  soundBtn.style.display='block';
  // Initial spawns
  for(let i=0;i<4;i++)setTimeout(()=>spawnLotus(),i*700);
  for(let i=0;i<2;i++)setTimeout(()=>spawnDragonfly(),1000+i*2000);
  // Hint
  setTimeout(()=>hintEl.classList.add('show'),1500);
  setTimeout(()=>hintEl.classList.remove('show'),7000);
  requestAnimationFrame(loop);
});

soundBtn.addEventListener('click',()=>{
  const on=audio.toggle();
  soundBtn.textContent=on?'♪':'✕';
  soundBtn.style.opacity=on?'1':'0.4';
});

</script>
</body>
