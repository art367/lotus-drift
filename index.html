<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lotus Drift</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#060610;touch-action:none;user-select:none;-webkit-user-select:none}
  canvas{display:block;width:100%;height:100%}
  #ui-overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:10;font-family:'Georgia','Times New Roman',serif}
  #start-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:1;transition:opacity 2s ease;pointer-events:auto}
  #start-screen.hidden{opacity:0;pointer-events:none}
  .title{font-size:clamp(2.5rem,8vw,5rem);color:#f5e6f0;letter-spacing:0.15em;text-shadow:0 0 40px rgba(255,180,200,0.3),0 0 80px rgba(255,150,180,0.15);margin-bottom:0.3em;font-weight:300}
  .subtitle{font-size:clamp(0.8rem,2.5vw,1.2rem);color:rgba(200,180,200,0.6);letter-spacing:0.3em;text-transform:uppercase;margin-bottom:3em;font-weight:300}
  .start-btn{background:none;border:1px solid rgba(255,200,220,0.2);color:rgba(255,220,230,0.7);padding:1em 3em;font-size:clamp(0.9rem,2vw,1.1rem);font-family:inherit;letter-spacing:0.2em;cursor:pointer;transition:all 1s ease;border-radius:50px;pointer-events:auto}
  .start-btn:hover{border-color:rgba(255,200,220,0.5);color:rgba(255,220,230,0.95);box-shadow:0 0 30px rgba(255,180,200,0.15);background:rgba(255,200,220,0.05)}
  .hint{position:fixed;bottom:8%;left:50%;transform:translateX(-50%);color:rgba(180,170,190,0.35);font-size:clamp(0.7rem,1.8vw,0.85rem);letter-spacing:0.15em;font-family:'Georgia',serif;transition:opacity 3s ease;pointer-events:none}
  .hint.hidden{opacity:0}
  #sound-toggle{position:fixed;top:1.5rem;right:1.5rem;background:none;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);width:44px;height:44px;border-radius:50%;font-size:1.2rem;cursor:pointer;pointer-events:auto;z-index:20;transition:all 0.5s ease;display:none;line-height:44px;text-align:center;padding:0}
  #sound-toggle:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.7)}
  #sleep-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(200,180,210,0);font-size:clamp(1rem,3vw,1.5rem);font-family:'Georgia',serif;letter-spacing:0.2em;pointer-events:none;transition:color 4s ease;z-index:15}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui-overlay">
  <div id="start-screen">
    <div class="title">Lotus Drift</div>
    <div class="subtitle">a breathing space</div>
    <button class="start-btn" id="start-btn">Enter the Pond</button>
  </div>
</div>
<div class="hint" id="hint">touch the water</div>
<button id="sound-toggle">♪</button>
<div id="sleep-msg">rest now</div>
<script>
// ═══════════════════════════════════════════
// LOTUS DRIFT — A Breathing Space
// ═══════════════════════════════════════════

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Utilities ──────────────────────────────
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
const rand = (a, b) => Math.random() * (b - a) + a;
const randInt = (a, b) => Math.floor(rand(a, b + 1));
const easeInOut = t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
const easeOut = t => 1 - (1 - t) * (1 - t);
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);

// ── Color Helpers ──────────────────────────
function hsla(h, s, l, a) { return `hsla(${h},${s}%,${l}%,${a})`; }
function rgba(r, g, b, a) { return `rgba(${r},${g},${b},${a})`; }

// ── Audio Engine ───────────────────────────
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.enabled = false;
    this.masterGain = null;
    this.volume = 0.35;
    this.droneNodes = [];
    this.pentatonic = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];
    this.initialized = false;
  }

  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = this.volume;
      this.masterGain.connect(this.ctx.destination);

      // Reverb via convolver
      this.reverb = this.ctx.createConvolver();
      const len = this.ctx.sampleRate * 3;
      const impulse = this.ctx.createBuffer(2, len, this.ctx.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const d = impulse.getChannelData(ch);
        for (let i = 0; i < len; i++) {
          d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
        }
      }
      this.reverb.buffer = impulse;
      this.reverbGain = this.ctx.createGain();
      this.reverbGain.gain.value = 0.3;
      this.reverb.connect(this.reverbGain);
      this.reverbGain.connect(this.masterGain);

      this.startDrone();
      this.startWaterAmbience();
      this.initialized = true;
      this.enabled = true;
    } catch (e) { console.log('Audio not available'); }
  }

  startDrone() {
    const freqs = [55, 82.5, 110];
    freqs.forEach(f => {
      const osc = this.ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = f;
      const g = this.ctx.createGain();
      g.gain.value = 0.015;
      osc.connect(g);
      g.connect(this.masterGain);
      osc.start();
      this.droneNodes.push({ osc, gain: g });
    });
  }

  startWaterAmbience() {
    const bufSize = this.ctx.sampleRate * 2;
    const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

    this.noiseSource = this.ctx.createBufferSource();
    this.noiseSource.buffer = buf;
    this.noiseSource.loop = true;

    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 200;
    filter.Q.value = 0.5;

    const noiseGain = this.ctx.createGain();
    noiseGain.gain.value = 0.02;

    this.noiseSource.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(this.masterGain);
    this.noiseSource.start();
    this.waterGain = noiseGain;
  }

  playChime(pitch) {
    if (!this.enabled || !this.ctx) return;
    const freq = this.pentatonic[pitch % this.pentatonic.length];
    const now = this.ctx.currentTime;

    const osc = this.ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;

    const osc2 = this.ctx.createOscillator();
    osc2.type = 'sine';
    osc2.frequency.value = freq * 2.01;

    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.08, now + 0.3);
    g.gain.exponentialRampToValueAtTime(0.001, now + 4);

    const g2 = this.ctx.createGain();
    g2.gain.setValueAtTime(0, now);
    g2.gain.linearRampToValueAtTime(0.025, now + 0.2);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 2.5);

    osc.connect(g);
    osc2.connect(g2);
    g.connect(this.reverb);
    g.connect(this.masterGain);
    g2.connect(this.reverb);
    g2.connect(this.masterGain);

    osc.start(now);
    osc2.start(now);
    osc.stop(now + 4.5);
    osc2.stop(now + 3);
  }

  playRipple() {
    if (!this.enabled || !this.ctx) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(180, now);
    osc.frequency.exponentialRampToValueAtTime(60, now + 1.5);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.02, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
    osc.connect(g);
    g.connect(this.masterGain);
    osc.start(now);
    osc.stop(now + 1.8);
  }

  setVolume(v) {
    this.volume = v;
    if (this.masterGain) this.masterGain.gain.setTargetAtTime(v, this.ctx.currentTime, 0.5);
  }

  toggle() {
    this.enabled = !this.enabled;
    this.setVolume(this.enabled ? 0.35 : 0);
    return this.enabled;
  }
}

const audio = new AudioEngine();

// ── Star Field ─────────────────────────────
class Star {
  constructor() {
    this.x = rand(0, 1);
    this.y = rand(0, 0.45);
    this.size = rand(0.5, 2);
    this.brightness = rand(0.2, 0.8);
    this.twinkleSpeed = rand(0.3, 1.5);
    this.twinkleOffset = rand(0, Math.PI * 2);
  }

  draw(ctx, time, alpha) {
    const tw = 0.5 + 0.5 * Math.sin(time * this.twinkleSpeed + this.twinkleOffset);
    const a = this.brightness * tw * alpha;
    if (a < 0.01) return;
    const x = this.x * W;
    const y = this.y * H;
    ctx.beginPath();
    ctx.arc(x, y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = rgba(220, 225, 255, a);
    ctx.fill();
    if (this.size > 1.2) {
      ctx.beginPath();
      ctx.arc(x, y, this.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = rgba(200, 210, 255, a * 0.08);
      ctx.fill();
    }
  }
}

// ── Moon ───────────────────────────────────
function drawMoon(ctx, time, alpha) {
  const mx = W * 0.82;
  const my = H * 0.12;
  const r = Math.min(W, H) * 0.04;

  // Outer glow
  const grad = ctx.createRadialGradient(mx, my, r * 0.5, mx, my, r * 8);
  grad.addColorStop(0, rgba(200, 210, 240, 0.08 * alpha));
  grad.addColorStop(0.3, rgba(180, 190, 220, 0.03 * alpha));
  grad.addColorStop(1, rgba(150, 160, 200, 0));
  ctx.fillStyle = grad;
  ctx.fillRect(mx - r * 8, my - r * 8, r * 16, r * 16);

  // Moon body
  ctx.beginPath();
  ctx.arc(mx, my, r, 0, Math.PI * 2);
  ctx.fillStyle = rgba(220, 225, 245, 0.6 * alpha);
  ctx.fill();

  // Inner glow
  const ig = ctx.createRadialGradient(mx, my, 0, mx, my, r);
  ig.addColorStop(0, rgba(240, 240, 255, 0.3 * alpha));
  ig.addColorStop(1, rgba(200, 210, 240, 0));
  ctx.fillStyle = ig;
  ctx.beginPath();
  ctx.arc(mx, my, r, 0, Math.PI * 2);
  ctx.fill();
}

// ── Ripple ─────────────────────────────────
class Ripple {
  constructor(x, y, maxRadius) {
    this.x = x;
    this.y = y;
    this.radius = 0;
    this.maxRadius = maxRadius || rand(80, 160);
    this.life = 0;
    this.maxLife = rand(2.5, 4);
    this.dead = false;
  }

  update(dt) {
    this.life += dt;
    if (this.life >= this.maxLife) { this.dead = true; return; }
    const t = this.life / this.maxLife;
    this.radius = this.maxRadius * easeOutCubic(t);
  }

  draw(ctx) {
    const t = this.life / this.maxLife;
    const alpha = (1 - t) * 0.2;
    if (alpha < 0.005) return;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.strokeStyle = rgba(200, 220, 255, alpha);
    ctx.lineWidth = 1.5 * (1 - t);
    ctx.stroke();
    if (t < 0.3) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius * 0.7, 0, Math.PI * 2);
      ctx.strokeStyle = rgba(200, 220, 255, alpha * 0.4);
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
  }
}

// ── Firefly ────────────────────────────────
class Firefly {
  constructor(x, y) {
    this.x = x || rand(0, W);
    this.y = y || rand(H * 0.3, H * 0.85);
    this.vx = rand(-8, 8);
    this.vy = rand(-6, 6);
    this.size = rand(1.5, 3.5);
    this.pulseSpeed = rand(0.8, 2);
    this.pulseOffset = rand(0, Math.PI * 2);
    this.life = 0;
    this.maxLife = rand(6, 15);
    this.dead = false;
    this.hue = rand(40, 70);
  }

  update(dt) {
    this.life += dt;
    if (this.life >= this.maxLife) { this.dead = true; return; }
    this.vx += rand(-5, 5) * dt;
    this.vy += rand(-5, 5) * dt;
    this.vx *= 0.98;
    this.vy *= 0.98;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
  }

  draw(ctx, time) {
    const lt = this.life / this.maxLife;
    let alpha = lt < 0.15 ? lt / 0.15 : lt > 0.7 ? (1 - lt) / 0.3 : 1;
    const pulse = 0.5 + 0.5 * Math.sin(time * this.pulseSpeed + this.pulseOffset);
    alpha *= 0.4 + 0.6 * pulse;
    if (alpha < 0.01) return;

    // Glow
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 8);
    grad.addColorStop(0, hsla(this.hue, 80, 75, alpha * 0.3));
    grad.addColorStop(1, hsla(this.hue, 80, 50, 0));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 8, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = hsla(this.hue, 70, 85, alpha * 0.9);
    ctx.fill();
  }
}

// ── Floating Petal (detached) ──────────────
class FloatingPetal {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.vx = rand(-15, 15);
    this.vy = rand(-5, 5);
    this.rotation = rand(0, Math.PI * 2);
    this.rotSpeed = rand(-0.3, 0.3);
    this.size = rand(4, 9);
    this.life = 0;
    this.maxLife = rand(8, 16);
    this.dead = false;
    this.color = color || { r: 240, g: 180, b: 200 };
    this.drift = rand(0.3, 1.2);
  }

  update(dt) {
    this.life += dt;
    if (this.life >= this.maxLife) { this.dead = true; return; }
    this.rotation += this.rotSpeed * dt;
    this.vx *= 0.995;
    this.x += this.vx * dt + Math.sin(this.life * 0.3) * this.drift * dt;
    this.y += this.vy * dt + this.drift * dt * 0.5;
  }

  draw(ctx) {
    const lt = this.life / this.maxLife;
    let alpha = lt > 0.6 ? (1 - lt) / 0.4 : 1;
    alpha *= 0.7;
    if (alpha < 0.01) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.beginPath();
    ctx.moveTo(0, -this.size);
    ctx.bezierCurveTo(this.size * 0.6, -this.size * 0.3, this.size * 0.5, this.size * 0.5, 0, this.size);
    ctx.bezierCurveTo(-this.size * 0.5, this.size * 0.5, -this.size * 0.6, -this.size * 0.3, 0, -this.size);
    ctx.fillStyle = rgba(this.color.r, this.color.g, this.color.b, alpha);
    ctx.fill();
    ctx.restore();
  }
}

// ── Light Mote (bloom particles) ───────────
class LightMote {
  constructor(x, y) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(5, 25);
    this.x = x;
    this.y = y;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed - rand(3, 10);
    this.size = rand(1, 3);
    this.life = 0;
    this.maxLife = rand(2, 5);
    this.dead = false;
    this.hue = rand(30, 55);
  }

  update(dt) {
    this.life += dt;
    if (this.life >= this.maxLife) { this.dead = true; return; }
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vx *= 0.97;
    this.vy *= 0.97;
  }

  draw(ctx) {
    const lt = this.life / this.maxLife;
    const alpha = (1 - lt) * 0.6;
    if (alpha < 0.01) return;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * (1 - lt * 0.5), 0, Math.PI * 2);
    ctx.fillStyle = hsla(this.hue, 80, 80, alpha);
    ctx.fill();
  }
}

// ── Touch Trail ────────────────────────────
class TrailPoint {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.life = 0;
    this.maxLife = 2;
    this.dead = false;
  }
  update(dt) {
    this.life += dt;
    if (this.life >= this.maxLife) this.dead = true;
  }
}

// ═══════════════════════════════════════════
// THE LOTUS — Heart of the Experience
// ═══════════════════════════════════════════
class Lotus {
  constructor(x, y, opts = {}) {
    this.x = x;
    this.y = y;
    this.baseSize = opts.size || rand(20, 40);
    this.size = this.baseSize;
    this.petalCount = opts.petals || randInt(6, 10);
    this.openness = 0; // 0 = closed bud, 1 = fully open
    this.targetOpenness = 0;
    this.bloomSpeed = rand(0.15, 0.3); // slow organic opening
    this.glowIntensity = 0;
    this.touched = false;
    this.blooming = false;
    this.fullyBloomed = false;
    this.bloomTime = 0;

    // Drift
    this.driftX = rand(-3, 3);
    this.driftY = rand(-1.5, 1.5);
    this.driftPhase = rand(0, Math.PI * 2);
    this.bobPhase = rand(0, Math.PI * 2);

    // Color — soft pinks, whites, occasional lavender
    const palettes = [
      { r: 245, g: 195, b: 210 }, // soft pink
      { r: 255, g: 230, b: 235 }, // pale rose
      { r: 240, g: 220, b: 245 }, // lavender
      { r: 255, g: 245, b: 240 }, // warm white
      { r: 235, g: 200, b: 225 }, // mauve
      { r: 220, g: 210, b: 240 }, // periwinkle
    ];
    this.color = opts.color || palettes[randInt(0, palettes.length - 1)];
    this.chimeIndex = randInt(0, 7);

    // Life
    this.life = 0;
    this.fadeTimer = 0;
    this.fading = false;
    this.alpha = 0;
    this.fadeInDuration = rand(2, 4);
    this.dead = false;
    this.isRare = opts.rare || Math.random() < 0.08;
    if (this.isRare) {
      this.baseSize *= 1.6;
      this.size = this.baseSize;
      this.bloomSpeed *= 0.5;
      this.petalCount = randInt(10, 14);
    }

    // Breathing sync
    this.breathPhase = 0;
    this.breathScale = 1;
  }

  touch() {
    if (this.blooming || this.fullyBloomed) return;
    this.touched = true;
    this.blooming = true;
    this.targetOpenness = 1;
  }

  update(dt, time, breathCycle) {
    this.life += dt;

    // Fade in
    if (this.life < this.fadeInDuration) {
      this.alpha = easeOut(this.life / this.fadeInDuration);
    } else {
      this.alpha = 1;
    }

    // Drift
    this.x += this.driftX * dt + Math.sin(time * 0.2 + this.driftPhase) * 0.3 * dt;
    this.y += this.driftY * dt + Math.sin(time * 0.15 + this.bobPhase) * 0.2 * dt;

    // Breathing scale sync
    this.breathScale = 1 + Math.sin(breathCycle) * 0.02;

    // Bloom animation — influenced by breath
    if (this.blooming) {
      // Bloom faster during exhale (breathCycle going from PI to 2PI)
      const breathInfluence = 0.7 + 0.3 * Math.max(0, Math.sin(breathCycle - Math.PI * 0.5));
      this.openness = lerp(this.openness, this.targetOpenness, this.bloomSpeed * breathInfluence * dt);
      this.glowIntensity = lerp(this.glowIntensity, this.openness * 0.8, dt * 0.5);
      this.bloomTime += dt;

      if (this.openness > 0.95) {
        this.openness = 1;
        this.blooming = false;
        this.fullyBloomed = true;
        this.bloomTime = 0;
      }
    }

    // Post-bloom glow pulsing
    if (this.fullyBloomed) {
      this.bloomTime += dt;
      this.glowIntensity = 0.5 + 0.3 * Math.sin(time * 0.5 + this.driftPhase);

      // Fade memory — slowly close after being untouched
      this.fadeTimer += dt;
      if (this.fadeTimer > 20) { // 20 seconds then start fading
        this.fading = true;
      }
    }

    // Fading (closing back)
    if (this.fading) {
      this.openness = lerp(this.openness, 0, 0.03 * dt);
      this.glowIntensity = lerp(this.glowIntensity, 0, 0.05 * dt);
      this.alpha = lerp(this.alpha, 0, 0.04 * dt);
      if (this.alpha < 0.02) this.dead = true;
    }

    // Off screen? Mark dead
    const margin = 200;
    if (this.x < -margin || this.x > W + margin || this.y < -margin || this.y > H + margin) {
      this.dead = true;
    }

    this.size = this.baseSize * this.breathScale;
  }

  draw(ctx, time) {
    if (this.alpha < 0.01) return;
    const a = this.alpha;
    ctx.save();
    ctx.translate(this.x, this.y);

    // ── Water reflection (below) ──
    ctx.save();
    ctx.scale(1, -0.3);
    ctx.globalAlpha = a * 0.15 * this.glowIntensity;
    this._drawFlower(ctx, time, true);
    ctx.restore();

    // ── Glow ──
    if (this.glowIntensity > 0.01) {
      const glowR = this.size * 3 * (1 + this.openness);
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
      grad.addColorStop(0, rgba(this.color.r, this.color.g, this.color.b, this.glowIntensity * a * 0.25));
      grad.addColorStop(0.5, rgba(this.color.r, this.color.g, this.color.b, this.glowIntensity * a * 0.08));
      grad.addColorStop(1, rgba(this.color.r, this.color.g, this.color.b, 0));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, glowR, 0, Math.PI * 2);
      ctx.fill();
    }

    // ── The Flower ──
    ctx.globalAlpha = a;
    this._drawFlower(ctx, time, false);

    ctx.restore();
  }

  _drawFlower(ctx, time, isReflection) {
    const s = this.size;
    const open = this.openness;

    // ── Lily pad (flat leaf under flower) ──
    if (!isReflection) {
      ctx.beginPath();
      ctx.ellipse(0, s * 0.2, s * 1.3, s * 0.35, 0, 0, Math.PI * 2);
      ctx.fillStyle = rgba(30, 80, 50, 0.25 + open * 0.1);
      ctx.fill();
      // Leaf vein
      ctx.beginPath();
      ctx.moveTo(-s * 0.8, s * 0.2);
      ctx.quadraticCurveTo(0, s * 0.05, s * 0.8, s * 0.2);
      ctx.strokeStyle = rgba(40, 100, 60, 0.12);
      ctx.lineWidth = 0.7;
      ctx.stroke();
    }

    // ── Petals ──
    const layers = this.isRare ? 3 : 2;
    for (let layer = 0; layer < layers; layer++) {
      const count = this.petalCount - layer * 2;
      const layerOpen = clamp(open * (1 + layer * 0.3) - layer * 0.15, 0, 1);
      const layerSize = s * (1 - layer * 0.15);

      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2 + layer * 0.3;
        const spread = layerOpen * (0.8 + layer * 0.15);
        const petalAngle = angle + Math.PI * 0.5; // point upward when closed

        ctx.save();
        ctx.rotate(angle);
        ctx.translate(0, -layerSize * 0.1 * spread);

        // Petal shape
        const pLen = layerSize * (0.6 + spread * 0.5);
        const pWid = layerSize * 0.25 * (0.6 + open * 0.4);
        const closedCurl = (1 - open) * layerSize * 0.4;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(
          pWid, -pLen * 0.3 - closedCurl,
          pWid * 0.7, -pLen * 0.8,
          0, -pLen
        );
        ctx.bezierCurveTo(
          -pWid * 0.7, -pLen * 0.8,
          -pWid, -pLen * 0.3 - closedCurl,
          0, 0
        );

        // Petal gradient
        const lightness = 0.85 + layer * 0.05;
        const pr = Math.min(255, this.color.r * lightness);
        const pg = Math.min(255, this.color.g * lightness);
        const pb = Math.min(255, this.color.b * lightness);
        const petalAlpha = 0.6 + layer * 0.1 + open * 0.15;

        ctx.fillStyle = rgba(pr, pg, pb, petalAlpha);
        ctx.fill();

        // Subtle petal edge
        ctx.strokeStyle = rgba(pr, pg, pb, petalAlpha * 0.3);
        ctx.lineWidth = 0.5;
        ctx.stroke();

        ctx.restore();
      }
    }

    // ── Center (stamen) — visible when open ──
    if (open > 0.3) {
      const centerAlpha = (open - 0.3) / 0.7;
      const cr = s * 0.2;
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, cr);
      grad.addColorStop(0, hsla(45, 90, 75, centerAlpha * 0.9));
      grad.addColorStop(0.6, hsla(40, 80, 65, centerAlpha * 0.5));
      grad.addColorStop(1, hsla(35, 70, 55, 0));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, cr, 0, Math.PI * 2);
      ctx.fill();

      // Tiny stamens
      if (open > 0.6) {
        const sa = (open - 0.6) / 0.4;
        for (let i = 0; i < 8; i++) {
          const ang = (i / 8) * Math.PI * 2;
          const sx = Math.cos(ang) * cr * 0.6;
          const sy = Math.sin(ang) * cr * 0.6;
          ctx.beginPath();
          ctx.arc(sx, sy, 1.2, 0, Math.PI * 2);
          ctx.fillStyle = hsla(50, 80, 80, sa * 0.7);
          ctx.fill();
        }
      }
    }
  }

  hitTest(px, py) {
    const d = dist(px, py, this.x, this.y);
    return d < this.size * 2.5;
  }
}

// ═══════════════════════════════════════════
// GAME STATE & WORLD
// ═══════════════════════════════════════════
const state = {
  started: false,
  time: 0,
  phase: 0, // 0=surface calm, 1=quiet drift, 2=near sleep
  phaseTime: 0,
  breathCycle: 0,
  breathRate: 0.35, // cycles per second — ~4s inhale/exhale
  globalAlpha: 1,
  lastInteraction: 0,
  idleTime: 0,
  totalBlooms: 0,
  dimming: false,
  asleep: false,
};

const world = {
  stars: [],
  lotuses: [],
  ripples: [],
  fireflies: [],
  petals: [],
  motes: [],
  trailPoints: [],
  fogLayers: [],
};

// Initialize stars
for (let i = 0; i < 120; i++) world.stars.push(new Star());

// Fog layers
for (let i = 0; i < 4; i++) {
  world.fogLayers.push({
    x: rand(-W * 0.3, W),
    y: rand(H * 0.1, H * 0.45),
    w: rand(W * 0.5, W * 1.2),
    h: rand(30, 80),
    speed: rand(2, 8),
    alpha: rand(0.015, 0.04),
  });
}

// ── Lotus Spawning ─────────────────────────
let spawnTimer = 0;
function getSpawnInterval() {
  switch (state.phase) {
    case 0: return rand(2, 4);
    case 1: return rand(5, 9);
    case 2: return rand(10, 18);
    default: return 4;
  }
}

function getMaxLotuses() {
  switch (state.phase) {
    case 0: return 10;
    case 1: return 6;
    case 2: return 3;
    default: return 8;
  }
}

function spawnLotus() {
  const alive = world.lotuses.filter(l => !l.dead).length;
  if (alive >= getMaxLotuses()) return;

  // Spawn from edges or middle
  let x, y;
  const side = randInt(0, 3);
  const margin = 60;
  if (side === 0) { x = -margin; y = rand(H * 0.35, H * 0.85); }
  else if (side === 1) { x = W + margin; y = rand(H * 0.35, H * 0.85); }
  else if (side === 2) { x = rand(W * 0.15, W * 0.85); y = H + margin; }
  else { x = rand(W * 0.15, W * 0.85); y = rand(H * 0.4, H * 0.8); }

  world.lotuses.push(new Lotus(x, y));
}

// ── Water Rendering ────────────────────────
function drawWater(ctx, time, alpha) {
  // Base water gradient
  const waterGrad = ctx.createLinearGradient(0, H * 0.4, 0, H);
  waterGrad.addColorStop(0, rgba(8, 15, 30, 0.3 * alpha));
  waterGrad.addColorStop(0.3, rgba(6, 12, 28, 0.5 * alpha));
  waterGrad.addColorStop(1, rgba(4, 8, 20, 0.7 * alpha));
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0, H * 0.35, W, H * 0.65);

  // Subtle water lines / wavelets
  ctx.strokeStyle = rgba(100, 140, 180, 0.04 * alpha);
  ctx.lineWidth = 0.8;
  for (let i = 0; i < 8; i++) {
    const baseY = H * 0.4 + i * (H * 0.07);
    ctx.beginPath();
    for (let x = 0; x <= W; x += 20) {
      const y = baseY + Math.sin(x * 0.005 + time * 0.3 + i * 0.7) * 3
                + Math.sin(x * 0.01 + time * 0.15 + i * 1.3) * 1.5;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Moonlight reflection on water
  const moonX = W * 0.82;
  const reflGrad = ctx.createLinearGradient(moonX, H * 0.35, moonX, H);
  reflGrad.addColorStop(0, rgba(180, 200, 240, 0.04 * alpha));
  reflGrad.addColorStop(0.5, rgba(150, 170, 210, 0.02 * alpha));
  reflGrad.addColorStop(1, rgba(100, 120, 160, 0));
  ctx.fillStyle = reflGrad;
  ctx.fillRect(moonX - 40, H * 0.35, 80, H * 0.65);

  // Shimmer points
  for (let i = 0; i < 12; i++) {
    const sx = moonX + Math.sin(time * 0.4 + i * 2) * 30;
    const sy = H * 0.4 + i * (H * 0.045) + Math.sin(time * 0.3 + i) * 3;
    const sa = (0.05 + 0.05 * Math.sin(time * 1.2 + i * 1.7)) * alpha;
    ctx.beginPath();
    ctx.arc(sx, sy, rand(1, 2.5), 0, Math.PI * 2);
    ctx.fillStyle = rgba(200, 220, 255, sa);
    ctx.fill();
  }
}

// ── Fog ────────────────────────────────────
function drawFog(ctx, time, alpha) {
  world.fogLayers.forEach(f => {
    f.x += f.speed * 0.016;
    if (f.x > W + f.w) f.x = -f.w;

    const grad = ctx.createRadialGradient(f.x + f.w / 2, f.y, 0, f.x + f.w / 2, f.y, f.w / 2);
    grad.addColorStop(0, rgba(150, 160, 180, f.alpha * alpha));
    grad.addColorStop(1, rgba(150, 160, 180, 0));
    ctx.fillStyle = grad;
    ctx.fillRect(f.x, f.y - f.h, f.w, f.h * 2);
  });
}

// ── Sky Gradient ───────────────────────────
function drawSky(ctx, alpha) {
  const grad = ctx.createLinearGradient(0, 0, 0, H * 0.5);
  grad.addColorStop(0, rgba(8, 10, 25, alpha));
  grad.addColorStop(0.5, rgba(12, 15, 35, alpha));
  grad.addColorStop(1, rgba(15, 20, 45, alpha * 0.8));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H * 0.5);
}

// ═══════════════════════════════════════════
// INPUT HANDLING
// ═══════════════════════════════════════════
let pointerX = -1, pointerY = -1;
let pointerDown = false;

function handleInteraction(x, y) {
  if (!state.started) return;
  state.lastInteraction = state.time;
  state.idleTime = 0;

  // Add touch trail
  world.trailPoints.push(new TrailPoint(x, y));

  // Add ripple
  world.ripples.push(new Ripple(x, y, rand(60, 120)));
  audio.playRipple();

  // Check lotus hits
  for (const lotus of world.lotuses) {
    if (lotus.dead) continue;
    if (lotus.hitTest(x, y) && !lotus.fullyBloomed && !lotus.blooming) {
      lotus.touch();
      state.totalBlooms++;
      audio.playChime(lotus.chimeIndex);

      // Spawn fireflies
      const count = lotus.isRare ? randInt(5, 8) : randInt(2, 4);
      for (let i = 0; i < count; i++) {
        world.fireflies.push(new Firefly(lotus.x + rand(-20, 20), lotus.y + rand(-20, 20)));
      }

      // Spawn light motes
      for (let i = 0; i < randInt(8, 15); i++) {
        world.motes.push(new LightMote(lotus.x, lotus.y));
      }

      // Nearby ripple chain
      for (const other of world.lotuses) {
        if (other === lotus || other.dead) continue;
        const d = dist(lotus.x, lotus.y, other.x, other.y);
        if (d < 200) {
          setTimeout(() => {
            world.ripples.push(new Ripple(other.x, other.y, d * 0.4));
          }, d * 3);
        }
      }

      break; // one lotus per touch
    }
  }

  // Spawn petals from any fully bloomed lotus nearby
  for (const lotus of world.lotuses) {
    if (!lotus.fullyBloomed || lotus.dead) continue;
    const d = dist(x, y, lotus.x, lotus.y);
    if (d < 100 && Math.random() < 0.3) {
      world.petals.push(new FloatingPetal(lotus.x, lotus.y, lotus.color));
      lotus.fadeTimer = Math.max(lotus.fadeTimer - 3, 0); // refresh memory
    }
  }
}

// Mouse
canvas.addEventListener('mousedown', e => {
  pointerDown = true;
  handleInteraction(e.clientX, e.clientY);
});
canvas.addEventListener('mousemove', e => {
  pointerX = e.clientX;
  pointerY = e.clientY;
  if (pointerDown) handleInteraction(e.clientX, e.clientY);
});
canvas.addEventListener('mouseup', () => pointerDown = false);

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  pointerDown = true;
  handleInteraction(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  pointerX = t.clientX;
  pointerY = t.clientY;
  handleInteraction(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  pointerDown = false;
}, { passive: false });

// ═══════════════════════════════════════════
// PHASE PROGRESSION (Invisible)
// ═══════════════════════════════════════════
function updatePhase(dt) {
  state.phaseTime += dt;

  // Phase transitions based on time and interaction
  if (state.phase === 0 && state.phaseTime > 90) {
    state.phase = 1;
    state.phaseTime = 0;
  } else if (state.phase === 1 && state.phaseTime > 120) {
    state.phase = 2;
    state.phaseTime = 0;
  }

  // Idle detection — if no touch for a while, advance toward sleep
  state.idleTime += dt;
  if (state.idleTime > 30 && state.phase < 2) {
    state.phase = Math.min(2, state.phase + 1);
    state.phaseTime = 0;
    state.idleTime = 0;
  }

  // Breath rate slows in later phases
  const targetBreathRate = [0.35, 0.28, 0.2][state.phase];
  state.breathRate = lerp(state.breathRate, targetBreathRate, dt * 0.05);

  // Global dimming in phase 2
  if (state.phase === 2) {
    const dimTarget = Math.max(0.15, 1 - state.phaseTime * 0.003);
    state.globalAlpha = lerp(state.globalAlpha, dimTarget, dt * 0.02);
  } else {
    state.globalAlpha = lerp(state.globalAlpha, 1, dt * 0.05);
  }

  // "Do nothing" mode — no touch for 60s in phase 2
  if (state.phase === 2 && state.idleTime > 60 && !state.asleep) {
    state.asleep = true;
    triggerSleep();
  }

  // If user interacts during sleep, wake slightly
  if (state.asleep && state.idleTime < 2) {
    state.globalAlpha = lerp(state.globalAlpha, 0.4, dt * 0.1);
  }
}

function triggerSleep() {
  const msg = document.getElementById('sleep-msg');
  msg.style.color = 'rgba(200,180,210,0.4)';
  setTimeout(() => {
    msg.style.color = 'rgba(200,180,210,0)';
  }, 8000);
}

// ═══════════════════════════════════════════
// DRAW TOUCH TRAIL
// ═══════════════════════════════════════════
function drawTrail(ctx) {
  if (world.trailPoints.length < 2) return;
  ctx.beginPath();
  for (let i = 0; i < world.trailPoints.length; i++) {
    const p = world.trailPoints[i];
    const lt = p.life / p.maxLife;
    const alpha = (1 - lt) * 0.15;
    if (alpha < 0.005) continue;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3 * (1 - lt), 0, Math.PI * 2);
    ctx.fillStyle = rgba(180, 200, 230, alpha);
    ctx.fill();
  }
}

// ── Breathing Guide (very subtle) ──────────
function drawBreathingGuide(ctx, time) {
  if (state.phase < 1) return; // only show after phase 0
  const breathT = (1 + Math.sin(state.breathCycle)) / 2;
  const a = 0.06 * state.globalAlpha;
  if (a < 0.005) return;
  const size = 3 + breathT * 4;
  ctx.beginPath();
  ctx.arc(W / 2, H - 40, size, 0, Math.PI * 2);
  ctx.fillStyle = rgba(200, 200, 220, a);
  ctx.fill();
}

// ═══════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════
let lastTime = 0;
let started = false;

function update(dt) {
  state.time += dt;
  state.breathCycle += Math.PI * 2 * state.breathRate * dt;

  updatePhase(dt);

  // Spawn lotuses
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnLotus();
    spawnTimer = getSpawnInterval();
  }

  // Ambient firefly spawning
  if (Math.random() < 0.005 * (3 - state.phase)) {
    world.fireflies.push(new Firefly());
  }

  // Update everything
  world.lotuses.forEach(l => l.update(dt, state.time, state.breathCycle));
  world.ripples.forEach(r => r.update(dt));
  world.fireflies.forEach(f => f.update(dt));
  world.petals.forEach(p => p.update(dt));
  world.motes.forEach(m => m.update(dt));
  world.trailPoints.forEach(t => t.update(dt));

  // Clean dead
  world.lotuses = world.lotuses.filter(l => !l.dead);
  world.ripples = world.ripples.filter(r => !r.dead);
  world.fireflies = world.fireflies.filter(f => !f.dead);
  world.petals = world.petals.filter(p => !p.dead);
  world.motes = world.motes.filter(m => !m.dead);
  world.trailPoints = world.trailPoints.filter(t => !t.dead);
}

function draw() {
  const ga = state.globalAlpha;

  // Clear
  ctx.fillStyle = '#060610';
  ctx.fillRect(0, 0, W, H);

  // Sky
  drawSky(ctx, ga);

  // Stars
  world.stars.forEach(s => s.draw(ctx, state.time, ga));

  // Moon
  drawMoon(ctx, state.time, ga);

  // Fog (behind water)
  drawFog(ctx, state.time, ga * 0.7);

  // Water
  drawWater(ctx, state.time, ga);

  // Touch trail
  drawTrail(ctx);

  // Ripples
  ctx.globalAlpha = ga;
  world.ripples.forEach(r => r.draw(ctx));

  // Petals (on water)
  world.petals.forEach(p => p.draw(ctx));

  // Lotuses
  world.lotuses.forEach(l => l.draw(ctx, state.time));

  // Light motes
  world.motes.forEach(m => m.draw(ctx));

  // Fireflies
  world.fireflies.forEach(f => f.draw(ctx, state.time));

  // Fog (in front, subtle)
  drawFog(ctx, state.time + 100, ga * 0.3);

  // Breathing guide
  drawBreathingGuide(ctx, state.time);

  ctx.globalAlpha = 1;
}

function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // cap at 50ms
  lastTime = timestamp;

  if (state.started) {
    update(dt);
    draw();
  }

  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════
// START & UI
// ═══════════════════════════════════════════
const startScreen = document.getElementById('start-screen');
const startBtn = document.getElementById('start-btn');
const hintEl = document.getElementById('hint');
const soundToggle = document.getElementById('sound-toggle');

startBtn.addEventListener('click', () => {
  state.started = true;
  audio.init();
  startScreen.classList.add('hidden');
  soundToggle.style.display = 'block';

  // Initial lotus spawn burst
  for (let i = 0; i < 5; i++) {
    setTimeout(() => spawnLotus(), i * 800);
  }

  // Show hint briefly
  setTimeout(() => hintEl.classList.add('hidden'), 6000);
});

soundToggle.addEventListener('click', () => {
  const on = audio.toggle();
  soundToggle.textContent = on ? '♪' : '♪̸';
  soundToggle.style.opacity = on ? '1' : '0.4';
});

// Prevent context menu on long press (mobile)
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Start animation loop (runs even before game start for potential background)
requestAnimationFrame(loop);

// ── Pre-start ambient background ──────────
function drawPreStart() {
  if (state.started) return;
  state.time += 0.016;
  ctx.fillStyle = '#060610';
  ctx.fillRect(0, 0, W, H);
  drawSky(ctx, 0.5);
  world.stars.forEach(s => s.draw(ctx, state.time, 0.4));
  drawMoon(ctx, state.time, 0.4);
  requestAnimationFrame(drawPreStart);
}
drawPreStart();

</script>
